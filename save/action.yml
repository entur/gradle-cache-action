name: Gradle Cache Save
description: >
  Clean and save Gradle wrapper and dependency caches.
  Call this action with `if: always()` at the end of your job, passing
  build-outcome so the cache is tagged correctly. Caches from failed builds
  are saved under a separate key and are never used as the primary restore
  target for subsequent builds.

inputs:
  gradle-home-directory:
    description: Root directory of the Gradle project (where gradlew lives)
    required: false
    default: "."
  cache-prefix:
    description: >
      Must match the value passed to the restore action.
    required: false
    default: "default"
  build-outcome:
    description: >
      Outcome of the build step. Pass `job.status` here.
      Accepted values: success, failure, cancelled.
      When cancelled the save is skipped entirely.
    required: true

runs:
  using: composite
  steps:
    # Exit immediately for cancelled jobs — no point caching anything.
    - name: Skip on cancelled
      if: inputs.build-outcome == 'cancelled'
      shell: bash
      run: echo "::notice::Job was cancelled — skipping cache save."

    # Save the wrapper distribution so subsequent runs skip the download even
    # when the build failed.
    - name: Save Gradle wrapper cache
      if: inputs.build-outcome != 'cancelled' && hashFiles(format('{0}/.gradle/wrapper-save-always', inputs.gradle-home-directory)) != ''
      uses: actions/cache/save@v5
      with:
        path: ~/.gradle/wrapper/dists
        key: v1-gradle-wrapper-${{ runner.os }}-${{ inputs.cache-prefix }}-${{ github.action_ref }}-${{ hashFiles(format('{0}/gradle/wrapper/gradle-wrapper.properties', inputs.gradle-home-directory)) }}

    # Invoke Gradle's built-in cache cleanup mechanism (Gradle 8+).
    # A temporary init script is copied from the action's scripts/ directory
    # into ~/.gradle/init.d/ and removed after the cleanup invocation.
    # A throw-away temp directory is used as the working directory to work
    # around https://github.com/gradle/gradle/issues/29377.
    - name: Clean Gradle dependency cache
      if: inputs.build-outcome == 'success' && hashFiles(format('{0}/.gradle/dependencies-save-always', inputs.gradle-home-directory), format('{0}/.gradle/dependencies-save-on-success', inputs.gradle-home-directory)) != ''
      shell: bash
      env:
        GRADLE_HOME_DIR: ${{ inputs.gradle-home-directory }}
      run: |
        WRAPPER_PROPS="${GRADLE_HOME_DIR}/gradle/wrapper/gradle-wrapper.properties"
        if [[ ! -f "$WRAPPER_PROPS" ]]; then
          echo "::error::Could not find gradle-wrapper.properties at ${WRAPPER_PROPS}"
          exit 1
        fi

        GRADLE_VERSION=$(sed -n 's/.*gradle-\([0-9][0-9.]*\)-\(bin\|all\).*/\1/p' "$WRAPPER_PROPS")
        if [[ -z "$GRADLE_VERSION" ]]; then
          echo "::error::Could not extract Gradle version from ${WRAPPER_PROPS}"
          exit 1
        fi

        MAJOR=$(echo "$GRADLE_VERSION" | cut -d'.' -f1)
        if [[ "$MAJOR" -lt 8 ]]; then
          echo "::warning::Gradle ${GRADLE_VERSION} is not supported. Only Gradle 8+ supports built-in cache cleanup."
          exit 0
        fi

        MINOR=$(echo "$GRADLE_VERSION" | cut -d'.' -f2)

        mkdir -p ~/.gradle/init.d

        # Write the version-appropriate init script inline using printf so the
        # YAML literal block stays well-formed (heredocs at column 0 break it).
        # Gradle 8.8 added buildCache to the caches{} DSL; earlier versions do not.
        if [[ "$MAJOR" -gt 8 ]] || { [[ "$MAJOR" -eq 8 ]] && [[ "$MINOR" -ge 8 ]]; }; then
          printf '%s\n' \
            'beforeSettings { settings -> settings.caches {' \
            '    buildCache.removeUnusedEntriesAfterDays = 1' \
            '    downloadedResources.removeUnusedEntriesAfterDays = 1' \
            '    releasedWrappers.removeUnusedEntriesAfterDays = 1' \
            '    snapshotWrappers.removeUnusedEntriesAfterDays = 1' \
            '    createdResources.removeUnusedEntriesAfterDays = 1' \
            '    cleanup = Cleanup.ALWAYS' \
            '}}' \
            > ~/.gradle/init.d/cache-settings.gradle
        else
          printf '%s\n' \
            'beforeSettings { settings -> settings.caches {' \
            '    downloadedResources.removeUnusedEntriesAfterDays = 1' \
            '    releasedWrappers.removeUnusedEntriesAfterDays = 1' \
            '    snapshotWrappers.removeUnusedEntriesAfterDays = 1' \
            '    createdResources.removeUnusedEntriesAfterDays = 1' \
            '    cleanup = Cleanup.ALWAYS' \
            '}}' \
            > ~/.gradle/init.d/cache-settings.gradle
        fi

        # Resolve gradlew: support both absolute and workspace-relative paths.
        if [[ "$GRADLE_HOME_DIR" = /* ]]; then
          GRADLEW="${GRADLE_HOME_DIR}/gradlew"
        else
          GRADLEW="${GITHUB_WORKSPACE}/${GRADLE_HOME_DIR}/gradlew"
        fi
        if [[ ! -f "$GRADLEW" ]]; then
          echo "::warning::gradlew not found at ${GRADLEW} — skipping cache cleanup."
          rm -f ~/.gradle/init.d/cache-settings.gradle
          exit 0
        fi

        TMPDIR_GRADLE=$(mktemp -d)
        touch "${TMPDIR_GRADLE}/settings.gradle"
        touch "${TMPDIR_GRADLE}/build.gradle"

        echo "Running Gradle ${GRADLE_VERSION} cache cleanup (init: ~/.gradle/init.d/cache-settings.gradle)"
        (cd "${TMPDIR_GRADLE}" && "$GRADLEW" --no-daemon projects --info --stacktrace) \
          || echo "::warning::Gradle cache cleanup step exited non-zero; caches may not have been fully cleaned."

        rm -rf "${TMPDIR_GRADLE}"
        rm -f ~/.gradle/init.d/cache-settings.gradle

    - name: Save Gradle dependency cache for successful build
      if: inputs.build-outcome == 'success' && hashFiles(format('{0}/.gradle/dependencies-save-always', inputs.gradle-home-directory), format('{0}/.gradle/dependencies-save-on-success', inputs.gradle-home-directory)) != ''
      uses: actions/cache/save@v5
      with:
        path: ~/.gradle/caches
        key: v1-gradle-dependencies-${{ runner.os }}-${{ inputs.cache-prefix }}-${{ github.action_ref }}-${{ hashFiles(format('{0}/gradle/wrapper/gradle-wrapper.properties', inputs.gradle-home-directory)) }}-${{ hashFiles(format('{0}/.gradle/build-hash', inputs.gradle-home-directory)) }}

    - name: Save Gradle dependency cache for failed build.
      if: inputs.build-outcome == 'failure' && hashFiles(format('{0}/.gradle/dependencies-save-always', inputs.gradle-home-directory)) != ''
      uses: actions/cache/save@v5
      with:
        path: ~/.gradle/caches
        key: v1-gradle-dependencies-${{ runner.os }}-${{ inputs.cache-prefix }}-${{ github.action_ref }}-${{ hashFiles(format('{0}/gradle/wrapper/gradle-wrapper.properties', inputs.gradle-home-directory)) }}-${{ hashFiles(format('{0}/.gradle/build-hash', inputs.gradle-home-directory)) }}-failure-build
