name: Gradle Cache Restore
description: >
  Restore Gradle wrapper and dependency caches.
  Automatically prefers caches created by successful builds over those from
  failed builds. Call the matching save action (../save) at the end of your
  job, passing build-outcome so the cache is tagged correctly.

inputs:
  gradle-home-directory:
    description: Root directory of the Gradle project (where gradlew lives)
    required: false
    default: "."
  cache-prefix:
    description: >
      Prefix string included in the dependency cache key.
      Bump this value to manually invalidate the dependency cache.
    required: false
    default: "default"

runs:
  using: composite
  steps:
    # Restore the wrapper cache first so gradlew works for the build and for
    # the cleanup invocation in the save action. Exact key only — never restore
    # a different Gradle version on a cache miss.
    - name: Restore Gradle wrapper cache
      id: restore-wrapper
      uses: actions/cache/restore@v5
      with:
        path: ~/.gradle/wrapper/dists
        key: v1-gradle-wrapper-${{ runner.os }}-${{ inputs.cache-prefix }}-${{ github.action_ref }}-${{ hashFiles(format('{0}/gradle/wrapper/gradle-wrapper.properties', inputs.gradle-home-directory)) }}

    - name: Leave wrapper caching instructions for the save action
      shell: bash
      env:
        GRADLE_WRAPPER_CACHE_HIT: ${{ steps.restore-wrapper.outputs.cache-hit }}
        GRADLE_HOME_DIR: ${{ inputs.gradle-home-directory }}
      run: |
        if [[ "$GRADLE_WRAPPER_CACHE_HIT" != "true" ]]; then
          mkdir -p "$GRADLE_HOME_DIR/.gradle"
          echo YES > $GRADLE_HOME_DIR/.gradle/wrapper-save-always
        fi

    - name: Read Gradle version and compute build hash
      id: read-gradle-version
      shell: bash
      env:
        GRADLE_HOME_DIR: ${{ inputs.gradle-home-directory }}
      run: |
        # Hash all build-defining files for the dependency cache key.
        # Use -print0 / sort -z / xargs -0 to handle filenames with spaces.
        # If no files are found xargs -0 produces no output, so sha256sum hashes
        # an empty stream — still deterministic.
        BUILD_HASH=$(find "${GRADLE_HOME_DIR}" \
          \( -name "*.gradle" \
          -o -name "*.gradle.kts" \
          -o -name "gradle.properties" \
          -o -name "gradle-wrapper.properties" \
          -o -name "*.versions.toml" \) \
          -type f -print0 2>/dev/null \
          | sort -z \
          | xargs -0 sha256sum \
          | sha256sum \
          | cut -c1-64)
        
        mkdir -p $GRADLE_HOME_DIR/.gradle
        echo "${BUILD_HASH}" > $GRADLE_HOME_DIR/.gradle/build-hash

    #
    # Restore-key priority:
    #   1. key                     → a previous successful build with this exact hash
    #   2. key + failure-build     → a failed build with this exact hash
    #   3. otherwise               → any prior build for the same action prefix/action/gradle version

    - name: Restore Gradle dependency cache
      id: restore-dependencies
      uses: actions/cache/restore@v5
      with:
        path: ~/.gradle/caches
        key: v1-gradle-dependencies-${{ runner.os }}-${{ inputs.cache-prefix }}-${{ github.action_ref }}-${{ hashFiles(format('{0}/gradle/wrapper/gradle-wrapper.properties', inputs.gradle-home-directory)) }}-${{ hashFiles(format('{0}/.gradle/build-hash', inputs.gradle-home-directory)) }}
        restore-keys: |
          v1-gradle-dependencies-${{ runner.os }}-${{ inputs.cache-prefix }}-${{ github.action_ref }}-${{ hashFiles(format('{0}/gradle/wrapper/gradle-wrapper.properties', inputs.gradle-home-directory)) }}-${{ hashFiles(format('{0}/.gradle/build-hash', inputs.gradle-home-directory)) }}-failure-build
          v1-gradle-dependencies-${{ runner.os }}-${{ inputs.cache-prefix }}-${{ github.action_ref }}-${{ hashFiles(format('{0}/gradle/wrapper/gradle-wrapper.properties', inputs.gradle-home-directory)) }}

    - name: Leave dependency caching instructions for the save action
      shell: bash
      env:
        DEPENDENCIES_CACHE_HIT: ${{ steps.restore-dependencies.outputs.cache-hit }}
        DEPENDENCIES_CACHE_PRIMARY_KEY: ${{ steps.restore-dependencies.outputs.cache-primary-key }}
        DEPENDENCIES_CACHE_MATCHED_KEY: ${{ steps.restore-dependencies.outputs.cache-matched-key }}
        GRADLE_HOME_DIR: ${{ inputs.gradle-home-directory }}
      run: |
        mkdir -p $GRADLE_HOME_DIR/.gradle
        if [[ "$DEPENDENCIES_CACHE_HIT" == "true" ]]; then
          # got a cache hit for the same build files, for a successful build
          echo "YES" > $GRADLE_HOME_DIR/.gradle/dependencies-save-never
          echo "Saving cache not necessary."
        elif [[ $DEPENDENCIES_CACHE_MATCHED_KEY == "$DEPENDENCIES_CACHE_PRIMARY_KEY"* ]]; then
          # got a cache hit for the same build files, for a failed build
          echo "YES" > $GRADLE_HOME_DIR/.gradle/dependencies-save-on-success
          echo "Saving cache on success."
        else 
          # got a cache hit, for a build with different build files
          echo "YES" > $GRADLE_HOME_DIR/.gradle/dependencies-save-always
          echo "Saving cache."
        fi
