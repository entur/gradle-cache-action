name: Gradle Cache Restore
description: >
  Restore Gradle wrapper and dependency caches.
  Automatically prefers caches created by successful builds over those from
  failed builds. Call the matching save action (../save) at the end of your
  job, passing build-outcome so the cache is tagged correctly.

inputs:
  gradle-home-directory:
    description: Root directory of the Gradle project (where gradlew lives)
    required: false
    default: "."
  cache-prefix:
    description: >
      Prefix string included in the dependency cache key.
      Bump this value to manually invalidate the dependency cache.
    required: false
    default: "default"

outputs:
  gradle-version:
    description: Gradle version extracted from gradle-wrapper.properties
    value: ${{ steps.read-gradle-version.outputs.gradle-version }}

runs:
  using: composite
  steps:
    - name: Read Gradle version and compute build hash
      id: read-gradle-version
      shell: bash
      env:
        GRADLE_HOME_DIR: ${{ inputs.gradle-home-directory }}
      run: |
        WRAPPER_PROPS="${GRADLE_HOME_DIR}/gradle/wrapper/gradle-wrapper.properties"
        if [[ ! -f "$WRAPPER_PROPS" ]]; then
          echo "::error::Could not find gradle-wrapper.properties at ${WRAPPER_PROPS}"
          exit 1
        fi

        GRADLE_VERSION=$(sed -n 's/.*gradle-\([0-9][0-9.]*\)-\(bin\|all\).*/\1/p' "$WRAPPER_PROPS")
        if [[ -z "$GRADLE_VERSION" ]]; then
          echo "::error::Could not extract Gradle version from ${WRAPPER_PROPS}"
          exit 1
        fi

        MAJOR=$(echo "$GRADLE_VERSION" | cut -d'.' -f1)
        if [[ "$MAJOR" -lt 8 ]]; then
          echo "::error::Gradle ${GRADLE_VERSION} is not supported. Only Gradle 8+ supports built-in cache cleanup."
          exit 1
        fi

        echo "gradle-version=${GRADLE_VERSION}" >> "$GITHUB_OUTPUT"
        echo "GRADLE_CACHE_VERSION=${GRADLE_VERSION}" >> "$GITHUB_ENV"

        # Hash all build-defining files for the dependency cache key.
        # Use -print0 / sort -z / xargs -0 to handle filenames with spaces.
        # If no files are found xargs -0 produces no output, so sha256sum hashes
        # an empty stream — still deterministic.
        BUILD_HASH=$(find "${GRADLE_HOME_DIR}" \
          \( -name "*.gradle" \
          -o -name "*.gradle.kts" \
          -o -name "gradle.properties" \
          -o -name "gradle-wrapper.properties" \
          -o -name "*.versions.toml" \) \
          -type f -print0 2>/dev/null \
          | sort -z \
          | xargs -0 sha256sum \
          | sha256sum \
          | cut -c1-64)
        echo "GRADLE_CACHE_BUILD_HASH=${BUILD_HASH}" >> "$GITHUB_ENV"
        echo "::notice::Gradle ${GRADLE_VERSION} — build hash ${BUILD_HASH}"

    # Restore the wrapper cache first so gradlew works for the build and for
    # the cleanup invocation in the save action. Exact key only — never restore
    # a different Gradle version on a cache miss.
    - name: Restore Gradle wrapper cache
      id: restore-wrapper
      uses: actions/cache/restore@v5
      with:
        path: ~/.gradle/wrapper/dists
        key: gradle-wrapper-${{ runner.os }}-${{ env.GRADLE_CACHE_VERSION }}

    - name: Record wrapper cache hit
      shell: bash
      run: |
        echo "GRADLE_WRAPPER_CACHE_HIT=${{ steps.restore-wrapper.outputs.cache-hit }}" >> "$GITHUB_ENV"

    # Restore the dependency cache.
    #
    # The primary key (no suffix) is reserved exclusively for caches saved after
    # a SUCCESSFUL build.  Caches saved after a FAILED build use a "-failed"
    # suffix so they never block a future successful build from writing its own
    # clean entry to the primary key.
    #
    # Restore-key priority:
    #   1. Exact primary key     → a previous successful build with this exact hash
    #   2. "<hash>-" prefix      → a failed build with this exact hash
    #   3. "<prefix>-" prefix    → any prior build for the same action version/prefix
    - name: Restore Gradle dependency cache
      id: restore-deps
      uses: actions/cache/restore@v5
      with:
        path: ~/.gradle/caches
        key: gradle-deps-${{ runner.os }}-${{ github.action_ref || 'local' }}-${{ env.GRADLE_CACHE_VERSION }}-${{ inputs.cache-prefix }}-${{ env.GRADLE_CACHE_BUILD_HASH }}
        restore-keys: |
          gradle-deps-${{ runner.os }}-${{ github.action_ref || 'local' }}-${{ env.GRADLE_CACHE_VERSION }}-${{ inputs.cache-prefix }}-${{ env.GRADLE_CACHE_BUILD_HASH }}-
          gradle-deps-${{ runner.os }}-${{ github.action_ref || 'local' }}-${{ env.GRADLE_CACHE_VERSION }}-${{ inputs.cache-prefix }}-

    # Check the marker file written by the save action into ~/.gradle/caches/.
    # It records whether the restored cache came from a successful or failed build
    # so the save action knows whether to force a fresh save.
    - name: Check restored cache build status
      shell: bash
      run: |
        RESTORED_KEY="${{ steps.restore-deps.outputs.cache-matched-key }}"
        echo "GRADLE_DEP_CACHE_RESTORED_KEY=${RESTORED_KEY}" >> "$GITHUB_ENV"

        STATUS_FILE=~/.gradle/caches/.gradle-cache-build-status
        if [[ -z "$RESTORED_KEY" ]]; then
          echo "::notice::No dependency cache found — cold start."
          echo "GRADLE_CACHE_RESTORED_BUILD_STATUS=none" >> "$GITHUB_ENV"
        elif [[ -f "$STATUS_FILE" ]]; then
          RESTORED_STATUS=$(cat "$STATUS_FILE")
          echo "GRADLE_CACHE_RESTORED_BUILD_STATUS=${RESTORED_STATUS}" >> "$GITHUB_ENV"
          echo "::notice::Restored dependency cache '${RESTORED_KEY}' (created from a ${RESTORED_STATUS} build)."
        else
          # Older cache entry without a status file — treat as unknown / success.
          echo "GRADLE_CACHE_RESTORED_BUILD_STATUS=unknown" >> "$GITHUB_ENV"
          echo "::notice::Restored dependency cache '${RESTORED_KEY}' (no build-status marker found)."
        fi
